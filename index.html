<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/styles.css">
  </link>
  <title>Whatc A Mole</title>
</head>

<body>
  <main>
    <header class="game_header">
      <div class="game_title">
        <div class="game_controler_layout">
          <h1 class="game_title_text">Welcome to whack-a-mole</h1>
          <h2 class="game_sore">Let's Go, your total score is <span class="game_score">0</span></h2>
          <div class="game_start_btn_layout">
            <button class="game_start_btn">Start Game!</button>
          </div>
        </div>
      </div>
      <div class="game_timer_layout">
        <div>
          <h2>Time Left</h2>
          <h2 class="timer">0</h2>
        </div>
      </div>
    </header>
    <div class="game_board"></div>
  </main>
  <script src="scripts/scripts.js"></script>
</body>

</html>
